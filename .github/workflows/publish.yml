name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [linux-x64, win-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Profile (${{ matrix.platform }})
        run: |
          dotnet publish hyperdu.Cli/hyperdu.Cli.csproj \
            -c Release \
            -r ${{ matrix.platform }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o publish/${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperdu-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}/
